<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Find Crop | OptiCrop</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark custom-navbar">

<div class="container">

<a class="navbar-brand" href="/">🌱 OptiCrop</a>

<button class="navbar-toggler"
type="button"
data-bs-toggle="collapse"
data-bs-target="#navbarNav">

<span class="navbar-toggler-icon"></span>

</button>

<div class="collapse navbar-collapse" id="navbarNav">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="/">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/about">About</a>
</li>

<li class="nav-item">
<a class="nav-link active" href="/findcrop">Find Crop</a>
</li>

</ul>

</div>

</div>

</nav>

<section class="py-5">

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="form-card">

<h2 class="text-center mb-4">

🌾 Crop Recommendation

</h2>

<p class="text-center text-muted mb-5">

Enter the soil and environmental parameters below to receive an AI-powered crop recommendation.

</p>

<form id="predictionForm"
      action="/predict"
      method="POST">

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">Nitrogen (N)</label>

<input
type="number"
class="form-control"
name="N"
placeholder="e.g. 90"

required
min="0"
max="150">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Phosphorus (P)</label>

<input
type="number"
class="form-control"
name="P"
placeholder="e.g. 42"

required

min="0"
max="150">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Potassium (K)</label>

<input
type="number"
class="form-control"
name="K"
placeholder="e.g. 43"

required
min="0"
max="250">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Temperature (°C)</label>

<input
type="number"
step="0.1"
class="form-control"
name="temperature"
placeholder="e.g. 25"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Humidity (%)</label>

<input
type="number"
step="0.1"
class="form-control"
name="humidity"
placeholder="e.g. 80"

required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Soil pH</label>

<input
type="number"
step="0.1"
class="form-control"
name="ph"
placeholder="e.g. 6.5"

required>

</div>

<div class="col-12 mb-4">

<label class="form-label">Rainfall (mm)</label>

<input
type="number"
step="0.1"
class="form-control"
name="rainfall"
placeholder="e.g. 180"
required>

</div>

<div class="text-center">

<button
type="submit"
id="predictBtn"
class="btn btn-success btn-lg w-100 py-3">

<i class="bi bi-cpu-fill"></i>

Predict Crop

</button>

</div>

</form>

</div>

</div>

</div>

</div>

</section>
<footer class="bg-dark text-white py-4 mt-5">

<div class="container text-center">

<h4>🌱 OptiCrop</h4>

<p>

Smart Agricultural Production Optimization Engine

</p>

<hr>

<p>

© 2026 OptiCrop. All Rights Reserved.

</p>

</div>

</footer>

<script>

const form = document.getElementById("predictionForm");
const btn = document.getElementById("predictBtn");

form.addEventListener("submit", function(){

btn.disabled = true;

btn.innerHTML = `
<span class="spinner-border spinner-border-sm"></span>
 Running AI Prediction...
`;

});

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
